displayName: 深蓝·设计增强版
name: taste-blue
description: 受 Taste-Skill + UI UX PRO MAX 设计体系启发的增强排版主题，在微信限制内最大化设计表达
version: 1.0

variables:
  # ── 色彩体系（Taste-Skill HSL 体系转 Hex）──
  primary-color: "#1A6DB5"        # --hue:188, --sat:82%, --lum:58%
  primary-dim: "#14527D"          # --accent-dim
  accent2: "#6B7BEF"              # --accent2: hsl(238, 82%, 74%)
  star-color: "#e6a817"           # --star: hsl(45, 97%, 57%)

  # ── 文字层级（Taste-Skill 三级纹理）──
  text-color: "#1a2332"           # 正文主色
  text-light: "#4a5568"           # 辅助文字
  text-muted: "#8899bb"           # 浅色文字/注释

  # ── 表面质感（UI UX PRO MAX 三级递进）──
  bg-accent-color: "#f0f7ff"      # 淡蓝底（强调区）
  bg-card: "#f8fafc"              # 卡片背景
  bg-soft: "#f3f6fb"              # 更柔和的背景

  # ── 边框与分割 ──
  border-color: "#e2e8f0"         # 标准边框
  border-accent: "#93C5FD"        # 强调边框
  card-shadow: "0 4px 12px rgba(0,0,0,0.06)"  # 卡片阴影

  # ── 代码区 ──
  code-bg: "#0F2A44"              # 代码块背景（深蓝）
  code-color: "#93C5FD"           # 代码块文字色

  # ── 间距与字阶（Taste-Skill Major Third 1.25）──
  font-size: "15px"
  line-height: "1.8"
  paragraph-spacing: "1.2em"

styles:
  # ── 正文 ──
  p: "font-size:{font-size}; line-height:{line-height}; color:{text-color}; margin:0 0 {paragraph-spacing}; letter-spacing:0.5px;"

  # ── 强调 ──
  strong: "color:{primary-color}; font-weight:bold;"
  strong-color: "{primary-color}"
  em: "font-style:italic; color:{text-light};"
  u: "text-decoration:underline; text-underline-offset:3px; text-decoration-color:{border-accent};"

  # ── 链接 ──
  a: "color:{primary-color}; text-decoration:none; border-bottom:1px solid {primary-color};"

  # ── 标题（Taste-Skill Type Scale 1.25）──
  h1: "text-align:center; font-size:22px; font-weight:bold; color:{primary-color}; letter-spacing:-0.02em; border-bottom:2px solid {primary-color}; padding-bottom:10px; margin-bottom:24px;"
  h2: "font-size:17px; font-weight:bold; color:#fff; background:{primary-color}; padding:6px 16px 5px; border-top-left-radius:4px; border-top-right-radius:4px; display:inline-block; margin:2em 0 0; border-bottom:2px solid {primary-dim}; letter-spacing:0.5px;"
  h3: "font-size:16px; font-weight:bold; color:{primary-color}; padding-left:12px; border-left:3px solid {primary-color}; margin:1.5em 0 0.6em;"
  h4: "font-size:15px; font-weight:bold; color:{primary-dim}; margin:1em 0 0.5em; letter-spacing:0.3px;"

  # ── 卡片式引用块（UI UX PRO MAX Card 组件）──
  blockquote: "border-left:4px solid {primary-color}; background:{bg-accent-color}; padding:14px 18px; margin:1.2em 0; color:{text-light}; border-radius:0 8px 8px 0; box-shadow:{card-shadow};"

  # ── 列表 ──
  ul: "padding-left:20px; margin:0.6em 0;"
  ol: "padding-left:20px; margin:0.6em 0;"
  li: "margin-bottom:6px; line-height:1.75; color:{text-color}; padding-left:4px;"

  # ── 分割线（UI UX PRO MAX 渐变淡出）──
  hr: "border:none; height:1px; background:linear-gradient(to right, transparent, {primary-color} 25%, {primary-color} 75%, transparent); margin:2.5em 0;"

  # ── 图片 ──
  img: "max-width:100%; border-radius:8px; display:block; margin:0 auto; box-shadow:{card-shadow};"
  figcaption: "text-align:center; font-size:12px; color:{text-muted}; margin-top:6px; letter-spacing:0.3px;"

  # ── 行内代码 / Badge ──
  code: "color:{primary-color}; background:{bg-accent-color}; padding:2px 8px; border-radius:4px; font-size:90%; border:1px solid {border-accent};"

  # ── 代码块（UI UX PRO MAX 深色终端风格）──
  pre: "background:{code-bg}; color:{code-color}; padding:18px; border-radius:10px; font-size:13px; line-height:1.8; overflow-x:auto; box-shadow:0 8px 24px rgba(0,0,0,0.2); border:1px solid rgba(147,197,253,0.1);"

  # ── 表格（UI UX PRO MAX 分离式圆角）──
  table: "width:100%; border-collapse:separate; border-spacing:0; margin:1.2em 0; font-size:14px; border-radius:8px; overflow:hidden; box-shadow:{card-shadow};"
  th: "background:{primary-color}; color:#fff; padding:10px 14px; text-align:center; font-weight:600; letter-spacing:0.3px;"
  td: "padding:10px 14px; text-align:center; color:{text-color}; border-bottom:1px solid {border-color};"
