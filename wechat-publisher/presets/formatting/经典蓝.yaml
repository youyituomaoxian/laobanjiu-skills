displayName: 经典蓝
name: default
description: 沉稳大气的编辑风格，适合科技、商业类账号
styles:
  a: 'color:#1A6DB5; text-decoration:none; border-bottom:1px solid #1A6DB5;'
  p: font-size:15px; line-height:1.8; color:#3a3a3a; margin:10px 0; letter-spacing:0.5px;
  u: text-decoration:underline; text-underline-offset:3px; text-decoration-color:#93C5FD;
  em: font-style:italic; color:#555;
  h1: 'text-align:center; font-size:22px; font-weight:bold; color:#1A6DB5; border-bottom:2px solid #1A6DB5; padding-bottom:10px;
    margin-bottom:24px;'
  h2: 'font-size:17px; font-weight:bold; color:#fff; background:#1A6DB5; padding:5px 14px 4px; border-top-left-radius:3px;
    border-top-right-radius:3px; display:inline-block; margin:2em 0 0; border-bottom:2px solid #14527D;'
  h3: 'font-size:16px; font-weight:bold; color:#1A6DB5; padding-left:10px; border-left:3px solid #1A6DB5; margin:1.5em 0 0.8em;'
  h4: font-size:15px; font-weight:bold; color:#444; margin:1.2em 0 0.6em;
  hr: border:none; height:1px; background:linear-gradient(to right, rgba(26,109,181,0), rgba(26,109,181,0.6), rgba(26,109,181,0));
    margin:2em 0;
  li: margin-bottom:6px; line-height:1.75; color:#3a3a3a;
  ol: padding-left:20px; margin:0.6em 0;
  td: 'padding:8px 12px; border-bottom:1px solid #e0e7ee; text-align:center; color:#444;'
  th: background:#1A6DB5; color:#fff; padding:8px 12px; text-align:center;
  ul: padding-left:20px; margin:0.6em 0;
  del: text-decoration:line-through; color:#999;
  img: max-width:100%; border-radius:5px; display:block; margin:0 auto; box-shadow:#84A1A8 0px 6px 12px;
  pre: background:#0F2A44; color:#93C5FD; padding:16px; border-radius:10px; font-size:13px; line-height:1.8; overflow-x:auto;
    box-shadow:0 8px 24px rgba(0,0,0,0.2);
  code: color:#1A6DB5; background:#EBF5FF; padding:2px 6px; border-radius:3px; font-size:90%;
  table: width:100%; border-collapse:collapse; margin:1em 0; font-size:14px;
  strong: color:#1A6DB5; font-weight:bold;
  highlight: 'background:#f7fbff; border-left:4px solid #1A6DB5; padding:12px 16px; border-radius:0 6px 6px 0; margin:1em
    0;'
  blockquote: 'border-left:4px solid #1A6DB5; background:#f7fbff; padding:14px 16px; margin:1.2em 0; color:#555;'
  figcaption: text-align:center; font-size:12px; color:#999; margin-top:6px;
